name: CD

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

# Required GitHub secrets (configure in repository settings):
# - AZURE_CLIENT_ID: Service principal client ID for OIDC authentication
# - AZURE_TENANT_ID: Azure AD tenant ID
# - AZURE_SUBSCRIPTION_ID: Azure subscription ID
#
# Required GitHub variables (configure in repository settings):
# - ACR_NAME: Azure Container Registry name
# - RESOURCE_GROUP: Azure resource group name

jobs:
  build-and-deploy:
    name: Build Images and Deploy
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.sha }}
      ACR_NAME: ${{ vars.ACR_NAME }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build mock-api image
        run: |
          az acr build \
            --registry $ACR_NAME \
            --resource-group $RESOURCE_GROUP \
            --image mock-api:$TAG \
            --image mock-api:latest \
            --file src/mock-api/Dockerfile \
            .

      - name: Build orchestration-api image
        run: |
          az acr build \
            --registry $ACR_NAME \
            --resource-group $RESOURCE_GROUP \
            --image orchestration-api:$TAG \
            --image orchestration-api:latest \
            --file src/orchestration-api/Dockerfile \
            .

      - name: Build agent-provisioner image
        run: |
          az acr build \
            --registry $ACR_NAME \
            --resource-group $RESOURCE_GROUP \
            --image agent-provisioner:$TAG \
            --image agent-provisioner:latest \
            --file src/agent-provisioner/Dockerfile \
            .

      - name: Build ui-app image
        run: |
          az acr build \
            --registry $ACR_NAME \
            --resource-group $RESOURCE_GROUP \
            --image ui-app:$TAG \
            --image ui-app:latest \
            --file src/ui-app/Dockerfile \
            src/ui-app

      - name: Get ACR login server
        id: acr
        run: |
          ACR_LOGIN_SERVER=$(az acr show --name $ACR_NAME --resource-group $RESOURCE_GROUP --query loginServer -o tsv)
          echo "login_server=$ACR_LOGIN_SERVER" >> $GITHUB_OUTPUT

      - name: Update ui-app container
        run: |
          az containerapp update \
            --name ui-app \
            --resource-group $RESOURCE_GROUP \
            --image ${{ steps.acr.outputs.login_server }}/ui-app:$TAG

      - name: Update orchestration-api container
        run: |
          az containerapp update \
            --name orchestration-api \
            --resource-group $RESOURCE_GROUP \
            --image ${{ steps.acr.outputs.login_server }}/orchestration-api:$TAG

      - name: Update mock-api container
        run: |
          az containerapp update \
            --name mock-api \
            --resource-group $RESOURCE_GROUP \
            --image ${{ steps.acr.outputs.login_server }}/mock-api:$TAG

      - name: Run agent-provisioner job
        run: |
          az containerapp job start \
            --name agent-provisioner-job \
            --resource-group $RESOURCE_GROUP \
            --image ${{ steps.acr.outputs.login_server }}/agent-provisioner:$TAG
