# nginx config for the ui-app container (T003).
# Serves the static Vite build and reverse-proxies /api/* to the orchestration API.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # SPA routing: fall back to index.html for client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the cockpit's API calls to the orchestration service.
    # ORCHESTRATION_API_URL is templated in at container start (default below).
    location /api/ {
        proxy_pass         ${ORCHESTRATION_API_URL}/api/;
        proxy_http_version 1.1;
        # Use the upstream host so Container Apps routes by ingress hostname,
        # and enable SNI so internal HTTPS ingress accepts the TLS handshake.
        proxy_set_header   Host              $proxy_host;
        proxy_ssl_server_name on;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Health endpoint for container probes.
    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
