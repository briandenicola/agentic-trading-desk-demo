version: '3'

# Root orchestrator for the WF-Garage solution (T004). Per ADR-0002 the stack is
# C#/.NET 10 + React; this replaces the prior Python Taskfile (retired in T043).
dotenv: ['.env']

vars:
  SOLUTION: WF-Garage.sln
  TAG: wf-garage

includes:
  local: ./tasks/Taskfile.local.yml
  cloud: ./tasks/Taskfile.cloud.yml
  build: ./tasks/Taskfile.build.yml

tasks:
  default:
    cmds:
      - task --list

  restore:
    desc: Restore NuGet packages
    cmds:
      - dotnet restore {{.SOLUTION}}

  build:
    desc: Build the .NET solution
    cmds:
      - dotnet build {{.SOLUTION}} -c Debug

  test:
    desc: Run the .NET test suite
    cmds:
      - dotnet test {{.SOLUTION}} -c Debug --nologo

  ui:install:
    desc: Install the React cockpit dependencies
    dir: src/ui-app
    cmds:
      - npm install

  ui:build:
    desc: Build the React cockpit
    dir: src/ui-app
    cmds:
      - npm run build

  secrets:
    desc: Scan for committed secrets
    cmds:
      - gitleaks detect --source .

  check:
    desc: Run all quality gates (build + test + secret scan)
    cmds:
      - task: build
      - task: test
      - task: secrets

  up:
    desc: 'Provision a region end-to-end via the 3-step Container Apps flow. Usage: task up -- <region>   (set DEMO_MODE=false for FULL/Foundry mode)'
    cmds:
      - task: cloud:apply-infra   # 1. environment (ACR, CAE, Key Vault, identity, Foundry)
      - task: build:all           # 2. build + push images to ACR
      - task: cloud:apply-apps    # 3. Container Apps against the pushed images
      - task: cloud:provision     #    start the Foundry agent job (FULL mode only)
      - task: cloud:url

  down:
    desc: 'Tear down a region. Usage: task down -- <region>'
    cmds:
      - task: cloud:destroy
