version: '3'

# Local stack orchestration (docker compose). Requires Docker Desktop.
# Fully realized in Phase 7 (T040); the Dockerfiles referenced by docker-compose.yml are added in T035.
tasks:
  up:
    desc: Start the demo stack (ui-app, orchestration-api, mock-api)
    cmds:
      - docker compose up -d --build

  down:
    desc: Stop and remove the demo stack
    cmds:
      - docker compose down

  logs:
    desc: Tail logs for the demo stack
    cmds:
      - docker compose logs -f

  build:
    desc: Build all containers locally (requires Docker)
    cmds:
      - docker compose build

  rebuild:
    desc: Rebuild and restart local environment
    cmds:
      - task: down
      - task: build
      - task: up

  status:
    desc: Show status of local containers
    cmds:
      - docker compose ps
