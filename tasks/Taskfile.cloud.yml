version: '3'

# Cloud infrastructure lifecycle for AgenticTradersDesk (Azure Container Apps + optional
# Azure AI Foundry). Region-per-workspace model, mirroring
# briandenicola/online-banking-demo:
#
#   task up   -- canadacentral                          # DEMO mode (no Foundry)
#   $env:DEMO_MODE='false'; task up -- swedencentral    # FULL mode (Foundry)
#
# The positional arg after `--` is the Azure region AND the Terraform workspace
# name, so each region keeps fully isolated state. DEMO_MODE is an environment
# variable the task forwards to the `demo_mode` Terraform variable; it also
# derives `enable_foundry` (the inverse) and the `environment` naming token
# (demo|live). DEMO_MODE defaults to true so a bare `task up -- <region>` is a
# safe, Foundry-free demo deploy.

vars:
  INFRA_DIR: infra
  DEFAULT_REGION: swedencentral
  # Short git SHA of HEAD; the default image tag so rolls are provenance-traceable.
  GIT_SHA:
    sh: git rev-parse --short HEAD
  # Image tag to deploy. Defaults to the git SHA for provenance; override for a one-off
  # roll with `task cloud:deploy IMAGE_TAG=<tag> -- <region>`. Uniquely named so the root
  # Taskfile's unrelated `TAG` var cannot shadow it.
  IMAGE_TAG: '{{.IMAGE_TAG | default .GIT_SHA}}'
  # Region == Terraform workspace name (from `task ... -- <region>`).
  REGION: '{{default .DEFAULT_REGION .CLI_ARGS}}'
  # DEMO_MODE env var (default true) drives every mode-dependent toggle.
  DEMO_MODE:
    sh: printf '%s' "${DEMO_MODE:-true}"
  ENABLE_FOUNDRY:
    sh: '[ "${DEMO_MODE:-true}" = "true" ] && printf false || printf true'
  ENVIRONMENT:
    sh: '[ "${DEMO_MODE:-true}" = "true" ] && printf demo || printf live'
  TF_VARS: -var "location={{.REGION}}" -var "environment={{.ENVIRONMENT}}" -var "demo_mode={{.DEMO_MODE}}" -var "enable_foundry={{.ENABLE_FOUNDRY}}"

tasks:
  _init:
    internal: true
    desc: Init Terraform and select the region-named workspace
    cmds:
      - terraform -chdir={{.INFRA_DIR}} init -upgrade
      - terraform -chdir={{.INFRA_DIR}} workspace new {{.REGION}} 2>/dev/null || true
      - terraform -chdir={{.INFRA_DIR}} workspace select {{.REGION}}

  plan:
    desc: 'Plan a region. Usage: task cloud:plan -- <region>'
    cmds:
      - task: _init
      - terraform -chdir={{.INFRA_DIR}} plan -compact-warnings {{.TF_VARS}} -var "deploy_apps=true"

  # 3-step Container Apps deploy (see infra/variables.tf deploy_apps).
  # Step 1 of 3: environment only (ACR, CAE, Key Vault, identity, Foundry).
  apply-infra:
    desc: 'Step 1/3 - provision the environment (no Container Apps). Usage: task cloud:apply-infra -- <region>'
    cmds:
      - task: _init
      - terraform -chdir={{.INFRA_DIR}} apply -auto-approve -compact-warnings {{.TF_VARS}} -var "deploy_apps=false"

  # Step 3 of 3: the Container Apps + job, now that images exist in ACR.
  apply-apps:
    desc: 'Step 3/3 - provision the Container Apps against pushed images. Usage: task cloud:apply-apps -- <region>'
    cmds:
      - task: _init
      - terraform -chdir={{.INFRA_DIR}} apply -auto-approve -compact-warnings {{.TF_VARS}} -var "deploy_apps=true"

  provision:
    desc: Start the Foundry agent-provisioner job (FULL mode only)
    vars:
      RG_NAME:
        sh: terraform -chdir={{.INFRA_DIR}} output -raw resource_group_name
      ACR_LOGIN_SERVER:
        sh: terraform -chdir={{.INFRA_DIR}} output -raw acr_login_server
    cmds:
      - '[ "{{.DEMO_MODE}}" = "true" ] && echo "DEMO mode: no Foundry agent to provision" || az containerapp job start --name agent-provisioner-job --resource-group {{.RG_NAME}} --image {{.ACR_LOGIN_SERVER}}/agent-provisioner:{{.IMAGE_TAG}}'

  deploy:
    desc: Roll freshly rebuilt images onto the running Container Apps (manual image refresh)
    vars:
      RG_NAME:
        sh: terraform -chdir={{.INFRA_DIR}} output -raw resource_group_name
      ACR_LOGIN_SERVER:
        sh: terraform -chdir={{.INFRA_DIR}} output -raw acr_login_server
      # Unique per-run suffix forces a NEW revision so the mutable ":latest" tag is
      # actually re-pulled. Without this, `az containerapp update --image :latest` is a
      # no-op when the image reference string is unchanged (the app keeps the old digest).
      REV_SUFFIX: 'r{{now | date "0601021504"}}'
    cmds:
      - az containerapp update --name ui-app --resource-group {{.RG_NAME}} --image {{.ACR_LOGIN_SERVER}}/ui-app:{{.IMAGE_TAG}} --revision-suffix {{.REV_SUFFIX}}
      - az containerapp update --name orchestration-api --resource-group {{.RG_NAME}} --image {{.ACR_LOGIN_SERVER}}/orchestration-api:{{.IMAGE_TAG}} --revision-suffix {{.REV_SUFFIX}}
      - az containerapp update --name mock-api --resource-group {{.RG_NAME}} --image {{.ACR_LOGIN_SERVER}}/mock-api:{{.IMAGE_TAG}} --revision-suffix {{.REV_SUFFIX}}

  reset-mock-api:
    desc: 'Reset the demo - restart mock-api so admin-injected headlines drop and the seed events reload (in-memory store). Usage: task cloud:reset-mock-api'
    vars:
      RG_NAME:
        sh: terraform -chdir={{.INFRA_DIR}} output -raw resource_group_name
    cmds:
      - az containerapp revision restart --name mock-api --resource-group {{.RG_NAME}} --revision $(az containerapp revision list --name mock-api --resource-group {{.RG_NAME}} --query "[?properties.active].name | [0]" -o tsv)

  destroy:
    desc: 'Tear down a region. Usage: task cloud:destroy -- <region>'
    cmds:
      - task: _init
      - terraform -chdir={{.INFRA_DIR}} destroy -auto-approve -compact-warnings {{.TF_VARS}} -var "deploy_apps=true"

  output-env:
    desc: Export Terraform outputs for the active workspace to .env
    cmds:
      - |
        terraform -chdir={{.INFRA_DIR}} output -json | powershell -Command "$json = $input | ConvertFrom-Json; @('VITE_API_BASE_URL=' + $json.ui_app_url.value, 'ACR_NAME=' + $json.acr_name.value, 'RESOURCE_GROUP=' + $json.resource_group_name.value, 'FOUNDRY_PROJECT_ENDPOINT=' + $json.foundry_project_endpoint.value, 'FOUNDRY_MODEL=' + $json.foundry_model_deployment.value) | Out-File -Encoding utf8 .env"

  url:
    desc: Print the public UI app URL for the active workspace
    cmds:
      - terraform -chdir={{.INFRA_DIR}} output -raw ui_app_url

  fmt:
    desc: Format Terraform files
    cmds:
      - terraform -chdir={{.INFRA_DIR}} fmt

  validate:
    desc: Validate Terraform configuration
    cmds:
      - terraform -chdir={{.INFRA_DIR}} validate

  drift:
    desc: 'Detect config drift between Azure and Terraform for a region (exit 2 = drift). Usage: task cloud:drift -- <region>'
    cmds:
      - task: _init
      # -detailed-exitcode: 0 = in sync, 2 = drift, 1 = error. Note the image-roll
      # contract: every Container App has lifecycle.ignore_changes=[image] (images are
      # rolled by tag via cloud:deploy / cloud:audit), so plan never flags image drift.
      - terraform -chdir={{.INFRA_DIR}} plan -detailed-exitcode -compact-warnings {{.TF_VARS}} -var "deploy_apps=true"

  audit:
    desc: 'Prove running containers + Azure config match the repo (git SHA, /version, TF drift). Usage: task cloud:audit -- <region>'
    cmds:
      - task: _init
      - powershell -NoProfile -ExecutionPolicy Bypass -File "tasks\audit.ps1" -Region "{{.REGION}}" -InfraDir "{{.INFRA_DIR}}" -ExpectedSha "{{.GIT_SHA}}" -DemoMode "{{.DEMO_MODE}}" -Environment "{{.ENVIRONMENT}}" -EnableFoundry "{{.ENABLE_FOUNDRY}}"
